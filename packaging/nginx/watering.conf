# Этот файл подключается сервером Wiren Board HomeUI из каталога:
# /etc/nginx/includes/default.wb.d/*.conf

location = /watering {
    return 301 /watering/;
}

location ^~ /watering/ {
    # Управление поливом доступно только администратору.
    set $required_user_type "admin";
    auth_request /auth/check;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /watering;

    # FastAPI учитывает префикс /watering через web.root_path.
    proxy_pass http://127.0.0.1:8088;
    proxy_redirect off;
}

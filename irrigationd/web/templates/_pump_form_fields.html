<label><input type="checkbox" name="enabled" {% if pump.enabled %}checked{% endif %}> Использовать насос</label>
<label>Способ настройки<select class="relay-mode"><option value="basic" {% if not pump.relay_state_topic or pump.relay_device_id %}selected{% endif %}>Выбор из устройств Wiren Board</option><option value="manual" {% if pump.relay_state_topic and not pump.relay_device_id %}selected{% endif %}>MQTT-топики вручную</option></select></label>
<fieldset class="relay-basic" {% if pump.relay_state_topic and not pump.relay_device_id %}hidden{% endif %}><legend>Устройство Wiren Board</legend>
  <label>Устройство<select name="relay_device_id" data-selected="{{ pump.relay_device_id or '' }}"><option value="">Загрузка устройств…</option></select></label>
  <label>Канал<select name="relay_control_id" data-selected="{{ pump.relay_control_id or '' }}"><option value="">Сначала выберите устройство</option></select></label>
</fieldset>
<fieldset class="relay-manual" {% if not pump.relay_state_topic or pump.relay_device_id %}hidden{% endif %}><legend>MQTT-топики</legend>
  <label>Топик состояния<input name="relay_state_topic" value="{{ pump.relay_state_topic or '' if not pump.relay_device_id else '' }}"></label>
  <label>Топик управления<input name="relay_set_topic" value="{{ pump.relay_set_topic or '' if not pump.relay_device_id else '' }}"></label>
</fieldset>
<label>Задержка перед открытием реле, с<input type="number" name="start_delay_sec" min="0" max="60" step="0.1" value="{{ pump.start_delay_sec }}" required></label>
<div class="actions"><button type="submit">Сохранить и проверить</button><button type="button" data-probe="relay">Проверить</button><button type="button" class="danger" data-probe="test">Включить на 1 секунду</button><button type="button" class="secondary" onclick="this.closest('dialog').close()">Отмена</button></div>
<pre class="probe-result"></pre>
